{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Recommender</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{% static 'css/site.css' %}" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top border-bottom border-secondary-subtle">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="{% url 'movie-list' %}"><i class="bi bi-camera-reels me-2"></i>MovieHub</a>
      <div class="collapse navbar-collapse show">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="{% url 'movie-list' %}">Explore</a></li>
          {% if user.is_authenticated %}<li class="nav-item"><a class="nav-link" href="{% url 'dashboard' %}">My Dashboard</a></li>{% endif %}
        </ul>
        <div class="d-flex gap-2">
          {% if user.is_authenticated %}
            <form method="post" action="{% url 'logout' %}">{% csrf_token %}<button class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right me-1"></i>Logout</button></form>
          {% else %}
            <a class="btn btn-primary btn-sm" href="{% url 'login' %}"><i class="bi bi-box-arrow-in-right me-1"></i>Login</a>
          {% endif %}
        </div>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
